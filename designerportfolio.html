<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer Portfolio | UI/UX & Digital Art</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff4d4d; /* Subtle red accents */
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        p.subtitle { font-size: 1.2rem; color: #888; }

        /* Filter Navigation */
        nav {
            text-align: center;
            margin-bottom: 3rem;
        }

        nav button {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 0.5rem 1.5rem;
            margin: 0.2rem;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav button:hover, nav button.active {
            border-color: var(--accent-color);
            color: white;
            background-color: rgba(255, 77, 77, 0.1);
        }

        /* Portfolio Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 0 2rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            display: block; /* Ensures the whole card acts as a link block */
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
        }

        /* Smooth fade-out behavior for filtering */
        .card.hide {
            display: none;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #444;
        }

        .card-img {
            width: 100%;
            height: 250px;
            background: #252525;
            object-fit: cover;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        .card-title {
            font-size: 1.2rem;
            margin: 0;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 4rem;
            border-top: 1px solid #222;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>Flo's Portfolio</h1>
        <p class="subtitle">Specializing in UI/UX Research and Product Design.</p>
    </header>

    <nav id="filter-nav">
        <button class="active" data-filter="all">All Work</button>
        <button data-filter="ui-ux">Web Design</button>
        <button data-filter="digital-art">Digital Art</button>
        <button data-filter="product">Product Design</button>
        <button data-filter="graphic-design">Graphic Design</button>
    </nav>

    <section class="grid" id="portfolio-grid">
        
        <a href="bookxcessredesign.html" class="card" data-category="ui-ux">
            <div class="card-img" style="background-image: url('your-bookxcess-image.jpg'); background-size: cover; background-position: center;"></div>
            <div class="card-content">
                <span class="card-tag">UI/UX Case Study</span>
                <h3 class="card-title">BookXcess Redesign</h3>
            </div>
        </a>

        <a href="aadventureworld.html" class="card" data-category="ui-ux">
            <div class="card-img" style="background-image: url('your-aadventureworld-image.jpg'); background-size: cover; background-position: center;"></div>
            <div class="card-content">
                <span class="card-tag">UI/UX Case Study</span>
                <h3 class="card-title">Adventure World Prototype Design</h3>
            </div>
        </a>

        <a href="the-christmas.html" class="card" data-category="digital-art">
            <div class="card-img" style="background-image: url('your-clown-art.jpg'); background-size: cover; background-position: center;"></div>
            <div class="card-content">
                <span class="card-tag">Illustration</span>
                <h3 class="card-title">The Christmas</h3>
            </div>
        </a>

        <a href="shirtdesign.html" class="card" data-category="product">
            <div class="card-img" style="background-image: url('your-db-design.jpg'); background-size: cover; background-position: center;"></div>
            <div class="card-content">
                <span class="card-tag">Shirt Design</span>
                <h3 class="card-title">JCMC Youth T-shirt</h3>
            </div>
        </a>

    </section>

    <footer>
        <p>&copy; 2026 | Built with Code & Design</p>
    </footer>

    <script>
        const filterButtons = document.querySelectorAll('#filter-nav button');
        const projectCards = document.querySelectorAll('#portfolio-grid .card');

        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Remove active styling from all buttons and add to the clicked one
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                const filterValue = button.getAttribute('data-filter');

                // Show or hide cards based on chosen category
                projectCards.forEach(card => {
                    const cardCategory = card.getAttribute('data-category');
                    
                    if (filterValue === 'all' || cardCategory === filterValue) {
                        card.classList.remove('hide');
                    } else {
                        card.classList.add('hide');
                    }
                });
            });
        });
    </script>

</body>
</html>
